[uwsgi]
# Use Unix socket to communicate with Nginx (recommended)
# socket = :8000

# Or directly use HTTP (development environment)
http = :8000

# Project directory (directory containing manage.py)
chdir = /review_api

# Django's WSGI module
module = api.settings.wsgi:application

# Master process
master = true

# Number of worker processes
processes = 4

# Number of threads per worker process
threads = 2

# Clean up environment on exit
vacuum = true

# Process file (when communicating with Nginx)
# pidfile = /tmp/project-master.pid

# Run in background (not recommended in containers)
# daemonize = /var/log/uwsgi.log

# Maximum number of requests
max-requests = 5000

# Enable threads
enable-threads = true

# Clean up pyc files on exit
py-autoreload = 1